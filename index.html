<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>每日日历</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      color: #000;
      font-family: Georgia, serif;
      overflow: hidden;               /* Kindle: no scroll chrome */
    }

    /* ── Full-screen image wrapper ── */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    #cal-img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      /* Kindle: force grayscale rendering */
      filter: grayscale(1) contrast(1.05);
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* ── Flash overlay (残影清除) ── */
    #flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: #000;
      z-index: 100;
      transition: none;
    }

    /* ── Refresh button ── */
    #btn-wrap {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 200;
    }

    #refresh-btn {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      line-height: 44px;
      text-align: center;
      /* Subtle shadow so it's readable over any image area */
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000;
      /* Disable on Kindle during flash */
      transition: opacity .15s;
    }
    #refresh-btn:active { opacity: .6; }

    /* ── Status line (tiny, top-left) ── */
    #status {
      position: fixed;
      top: 6px;
      left: 10px;
      font-size: 11px;
      color: #555;
      z-index: 200;
      letter-spacing: .02em;
      pointer-events: none;
    }

    /* ── Error state ── */
    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      font-size: 15px;
      color: #333;
      text-align: center;
      padding: 32px;
    }
    #error-msg.visible { display: flex; }
  </style>
</head>
<body>

<div id="stage">
  <img id="cal-img" src="" alt="每日日历" />
</div>

<div id="flash"></div>

<div id="btn-wrap">
  <button id="refresh-btn" title="手动刷新" aria-label="刷新图片">↻</button>
</div>

<div id="status">加载中…</div>

<div id="error-msg">
  <span>⚠ 图片加载失败</span>
  <span id="error-detail" style="font-size:12px;color:#888;"></span>
</div>

<script>
  // ══════════════════════════════════════════════
  //  ⚙  配置区 — 只需修改这里
  // ══════════════════════════════════════════════

  // 坚果云图片公开直链（替换成你自己的链接）
  // 示例：https://dav.jianguoyun.com/dav/.../ 或坚果云分享直链
  const IMAGE_URL = "https://www.jianguoyun.com/c/tblv2/SMbfZII4XBKqAGNVPNIPLydY3Xx76FnrWC9Rri5DoHuKPUPWcASXeNB2L8vf8FOOXHQaWUTB/QKkmhZ1BTmNcSp-iOsXJxBZ2xU8MqxNUhrgxOYsDWqU/l";

  // 每天自动刷新的时刻（24小时制）
  const AUTO_REFRESH_HOUR   = 1;   // 1 点
  const AUTO_REFRESH_MINUTE = 0;   // 0 分

  // 轮询间隔（毫秒），用于检测图片是否变更
  // 坚果云公开链接限速，建议不低于 5 分钟
  const POLL_INTERVAL_MS = 5 * 60 * 1000;   // 5 分钟

  // ══════════════════════════════════════════════

  const img       = document.getElementById("cal-img");
  const flash     = document.getElementById("flash");
  const status    = document.getElementById("status");
  const errBox    = document.getElementById("error-msg");
  const errDetail = document.getElementById("error-detail");
  const btnRefresh = document.getElementById("refresh-btn");

  let lastETag   = null;   // 上次 ETag / Last-Modified 指纹
  let lastSize   = null;   // 备用：Content-Length
  let isBusy     = false;  // 防重入

  // ── 工具：格式化时间 ──────────────────────────
  function fmtTime(d) {
    const pad = n => String(n).padStart(2, "0");
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  // ── 全屏黑白闪烁（E-ink 残影清除）────────────
  // 黑→白→黑→白，共4帧，每帧 120ms
  function einkFlash() {
    return new Promise(resolve => {
      const frames = ["#000","#fff","#000","#fff"];
      let i = 0;
      flash.style.transition = "none";
      function next() {
        if (i >= frames.length) {
          flash.style.opacity = "0";
          resolve();
          return;
        }
        flash.style.background = frames[i];
        flash.style.opacity    = "1";
        i++;
        setTimeout(next, 120);
      }
      next();
    });
  }

  // ── 检测图片是否更新（HEAD 请求）─────────────
  async function hasChanged() {
    try {
      // 加时间戳让代理不缓存 HEAD，但图片请求本身用 ETag
      const res = await fetch(IMAGE_URL, {
        method: "HEAD",
        cache: "no-store",
      });
      if (!res.ok) return { changed: true, reason: `HTTP ${res.status}` };

      const etag = res.headers.get("ETag")
                || res.headers.get("Last-Modified")
                || res.headers.get("Content-Length");

      if (etag !== lastETag) {
        lastETag = etag;
        return { changed: true };
      }
      return { changed: false };
    } catch (e) {
      // 网络错误 / CORS 无法读取 header → 强制刷新
      return { changed: true, reason: e.message };
    }
  }

  // ── 加载并显示新图片 ─────────────────────────
  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const bust = url + (url.includes("?") ? "&" : "?") + "_t=" + Date.now();
      const tmp = new Image();
      tmp.onload  = () => resolve(bust);
      tmp.onerror = () => reject(new Error("图片加载失败：" + bust));
      tmp.src = bust;
    });
  }

  // ── 主刷新流程 ───────────────────────────────
  async function refresh(force = false) {
    if (isBusy) return;
    isBusy = true;
    btnRefresh.disabled = true;
    status.textContent  = "检测中…";
    errBox.classList.remove("visible");

    try {
      const { changed } = force ? { changed: true } : await hasChanged();

      if (!changed) {
        status.textContent = `无变化 · ${fmtTime(new Date())}`;
        return;
      }

      status.textContent = "加载图片…";

      // 预加载新图
      let newSrc;
      try {
        newSrc = await loadImage(IMAGE_URL);
      } catch (e) {
        throw e;
      }

      // E-ink 闪烁清残影
      await einkFlash();

      // 换图
      img.src = newSrc;
      status.textContent = `已更新 · ${fmtTime(new Date())}`;

    } catch (e) {
      errBox.classList.add("visible");
      errDetail.textContent = e.message;
      status.textContent = `错误 · ${fmtTime(new Date())}`;
    } finally {
      isBusy = false;
      btnRefresh.disabled = false;
    }
  }

  // ── 定时：每天凌晨 AUTO_REFRESH_HOUR 点准时触发 ──
  function scheduleNightlyRefresh() {
    const now  = new Date();
    const next = new Date(now);
    next.setHours(AUTO_REFRESH_HOUR, AUTO_REFRESH_MINUTE, 0, 0);
    if (next <= now) next.setDate(next.getDate() + 1);   // 已过则明天

    const delay = next - now;
    console.log(`[calendar] 下次自动刷新：${next.toLocaleString()}（${Math.round(delay/1000)}s 后）`);

    setTimeout(() => {
      refresh(true);          // 凌晨强制刷新
      scheduleNightlyRefresh(); // 循环注册明天
    }, delay);
  }

  // ── 定时：轮询检测变更 ───────────────────────
  function startPolling() {
    setInterval(() => refresh(false), POLL_INTERVAL_MS);
  }

  // ── 手动刷新按钮 ─────────────────────────────
  btnRefresh.addEventListener("click", () => refresh(true));

  // ── 启动 ─────────────────────────────────────
  refresh(true);          // 打开页面立即加载
  scheduleNightlyRefresh();
  startPolling();
</script>
</body>
</html>
